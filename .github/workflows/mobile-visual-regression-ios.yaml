name: Mobile Visual Regression iOS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test"
        required: true
        type: string
        default: production
      environment:
        description: "Environment to compare against"
        required: true
        type: choice
        options:
          - production
          - staging
        default: production

env:
  AWS_REGION: us-west-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  env_name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
  visual_regression_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'production' }}

concurrency:
  group: mobile-visual-regression-ios-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}

jobs:
  mobile-visual-regression-ios:
    runs-on: macos-26
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.visual_regression_ref }}

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.x
        run: corepack prepare yarn@4.9.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"

      - name: Capture Xcode Version
        id: xcode-version
        run: |
          VERSION=$(xcodebuild -version | awk 'NR==1 {printf "%s-", $2} NR==2 {printf "%s", $3}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Yarn Dependencies
        run: corepack yarn install --immutable

      - name: Install Backend Dependencies
        run: bun install --frozen-lockfile
        working-directory: ./server

      - name: Install @alliance/common dependencies
        run: bun install --frozen-lockfile
        working-directory: ./common

      - name: Restore CocoaPods Cache
        id: cocoapods-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cocoapods/repos
            ~/Library/Caches/CocoaPods
            ~/Library/Caches/org.cocoapods.CocoaPods
          key: mobile-ios-cocoapods-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode-version.outputs.version }}-${{ hashFiles('yarn.lock', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/babel.config.js', 'apps/mobile/metro.config.js') }}
          restore-keys: |
            mobile-ios-cocoapods-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode-version.outputs.version }}-

      - name: Install Postgres
        run: |
          brew install postgresql@17
          echo "$(brew --prefix postgresql@17)/bin" >> "$GITHUB_PATH"

      - name: Start Postgres
        run: |
          initdb -D "$RUNNER_TEMP/pgdata" -U postgres -A trust
          pg_ctl -D "$RUNNER_TEMP/pgdata" -l "$RUNNER_TEMP/postgres.log" -o "-p 5432" start
          pg_isready -h localhost -p 5432 -U postgres

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Prebuild iOS Project
        run: corepack yarn workspace @alliance/mobile exec expo prebuild --platform ios
        env:
          CI: "true"

      - name: Restore DerivedData Cache
        id: derived-data-cache
        uses: actions/cache/restore@v4
        with:
          path: citesting/ios-derived-data
          key: mobile-ios-derived-data-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode-version.outputs.version }}-${{ hashFiles('yarn.lock', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/**/*.ts', 'apps/mobile/**/*.tsx', 'apps/mobile/**/*.js', 'apps/mobile/**/*.jsx', 'apps/mobile/**/*.json', 'citesting/src/take-mobile-screenshots.ts', 'citesting/src/mobile-screenshot-targets.ts') }}
          restore-keys: |
            mobile-ios-derived-data-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode-version.outputs.version }}-${{ hashFiles('yarn.lock', 'apps/mobile/package.json', 'apps/mobile/app.json') }}-
            mobile-ios-derived-data-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode-version.outputs.version }}-

      - name: Take iOS Screenshots
        run: corepack yarn workspace @alliance/citesting take:mobile:ios
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: citesting
          ASSETS_BUCKET: ${{ secrets.CI_ASSETS_BUCKET }}
          SCREENSHOT_OUTPUT_DIR: ${{ github.workspace }}/screenshots-mobile/current

      - name: Save CocoaPods Cache
        if: always() && steps.cocoapods-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cocoapods/repos
            ~/Library/Caches/CocoaPods
            ~/Library/Caches/org.cocoapods.CocoaPods
          key: ${{ steps.cocoapods-cache.outputs.cache-primary-key }}

      - name: Save DerivedData Cache
        if: always() && steps.derived-data-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: citesting/ios-derived-data
          key: ${{ steps.derived-data-cache.outputs.cache-primary-key }}

      - name: Upload Current iOS Screenshots to S3
        run: |
          aws s3 sync \
            ${{ github.workspace }}/screenshots-mobile/current/ \
            s3://${{ secrets.VISUAL_REGRESSION_BUCKET }}/visual-regression/mobile/ios/${{ env.env_name }}/${{ github.sha }}/

      - name: Download iOS Baseline from S3
        run: |
          mkdir -p ${{ github.workspace }}/screenshots-mobile/baseline
          aws s3 sync \
            s3://${{ secrets.VISUAL_REGRESSION_BUCKET }}/visual-regression/mobile/ios/${{ env.env_name }}/latest/ \
            ${{ github.workspace }}/screenshots-mobile/baseline/ \
            || echo "No baseline found — first run"

      - name: Compare iOS Screenshots
        run: |
          BASELINE=${{ github.workspace }}/screenshots-mobile/baseline
          if [ "$(ls -A "$BASELINE" 2>/dev/null)" ]; then
            corepack yarn workspace @alliance/citesting compare \
              "$BASELINE" \
              ${{ github.workspace }}/screenshots-mobile/current \
              ${{ github.workspace }}/screenshots-mobile/diffs
          else
            echo "No baseline screenshots — skipping comparison"
          fi

      - name: AI Review iOS Screenshots
        id: mobile-ai-review
        continue-on-error: true
        run: |
          BASELINE=${{ github.workspace }}/screenshots-mobile/baseline
          if [ "$(ls -A "$BASELINE" 2>/dev/null)" ]; then
            corepack yarn workspace @alliance/citesting ai-review \
              "$BASELINE" \
              ${{ github.workspace }}/screenshots-mobile/current \
              ${{ github.workspace }}/screenshots-mobile/diffs
          else
            echo "No baseline — skipping AI review"
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_REVIEW_OUTPUT: ${{ github.workspace }}/screenshots-mobile/ai-review-results.json

      - name: Notify Slack on iOS Visual Regression
        if: steps.mobile-ai-review.outcome == 'failure'
        run: |
          RESULTS="${{ github.workspace }}/screenshots-mobile/ai-review-results.json"
          SHA="${{ github.sha }}"
          ENV_NAME="${{ env.env_name }}"
          BASELINE_DIR="${{ github.workspace }}/screenshots-mobile/baseline"
          CURRENT_DIR="${{ github.workspace }}/screenshots-mobile/current"
          TOKEN="${{ secrets.SLACK_BOT_TOKEN }}"
          CHANNEL="${{ secrets.SLACK_DEPLOY_CHANNEL_ID }}"

          upload_to_slack() {
            local filepath="$1"
            local title="$2"
            local filesize
            filesize=$(stat --printf="%s" "$filepath" 2>/dev/null || stat -f%z "$filepath")
            local filename
            filename=$(basename "$filepath")

            local url_resp
            url_resp=$(curl -s -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-type: application/x-www-form-urlencoded" \
              --data-urlencode "filename=${filename}" \
              --data-urlencode "length=${filesize}" \
              https://slack.com/api/files.getUploadURLExternal)

            local upload_url file_id
            upload_url=$(echo "$url_resp" | jq -r '.upload_url // empty')
            file_id=$(echo "$url_resp" | jq -r '.file_id // empty')

            if [ -z "$upload_url" ] || [ -z "$file_id" ]; then
              echo ""
              return
            fi

            curl -s -X POST \
              -F "file=@${filepath}" \
              "$upload_url" > /dev/null

            local complete_resp
            complete_resp=$(curl -s -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-type: application/json" \
              --data "$(jq -n --arg id "$file_id" --arg title "$title" \
                '{files: [{id: $id, title: $title}]}')" \
              https://slack.com/api/files.completeUploadExternal)

            echo "$complete_resp" | jq -r '.files[0].permalink // empty'
          }

          APPROVE_URL="${{ github.server_url }}/${{ github.repository }}/actions/workflows/approve-visual-baseline.yaml?environment=${ENV_NAME}&sha=${SHA}&suite=mobile-ios"

          NL=$'\n'
          TEXT=":red_circle: *iOS Visual Regression Detected (${ENV_NAME})*${NL}"
          TEXT+="Nightly iOS visual regression check failed.${NL}"
          TEXT+="*Commit:* \`${SHA}\`${NL}"
          TEXT+="<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>  |  <${APPROVE_URL}|Approve baseline>${NL}"

          FAILURES=$(cat "$RESULTS" | jq -c '.[] | select(.status == "fail")')
          while IFS= read -r fail; do
            PAGE=$(echo "$fail" | jq -r '.page')
            FILE="${PAGE}.png"

            TEXT+="${NL}*${PAGE}*${NL}"

            GALLERY=""
            if [ -f "$BASELINE_DIR/$FILE" ]; then
              PLINK=$(upload_to_slack "$BASELINE_DIR/$FILE" "${PAGE} — Baseline")
              [ -n "$PLINK" ] && GALLERY+="<${PLINK}| >"
            fi
            if [ -f "$CURRENT_DIR/$FILE" ]; then
              PLINK=$(upload_to_slack "$CURRENT_DIR/$FILE" "${PAGE} — Current")
              [ -n "$PLINK" ] && GALLERY+="<${PLINK}| >"
            fi

            [ -n "$GALLERY" ] && TEXT+="${NL}${GALLERY}${NL}"
          done <<< "$FAILURES"

          curl -s -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-type: application/json" \
            --data "$(jq -n --arg channel "$CHANNEL" --arg text "$TEXT" \
              '{channel: $channel, text: $text, mrkdwn: true, unfurl_links: true, unfurl_media: true}')" \
            https://slack.com/api/chat.postMessage

      - name: Notify Slack on AI-Approved iOS Changes
        if: steps.mobile-ai-review.outcome != 'failure'
        run: |
          RESULTS="${{ github.workspace }}/screenshots-mobile/ai-review-results.json"

          if [ ! -f "$RESULTS" ]; then
            echo "No results file — nothing to notify"
            exit 0
          fi

          AI_APPROVED=$(cat "$RESULTS" | jq -c '[.[] | select(.aiReviewed == true and .status == "pass")]')
          COUNT=$(echo "$AI_APPROVED" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No AI-reviewed changes — skipping notification"
            exit 0
          fi

          SHA="${{ github.sha }}"
          ENV_NAME="${{ env.env_name }}"
          BASELINE_DIR="${{ github.workspace }}/screenshots-mobile/baseline"
          CURRENT_DIR="${{ github.workspace }}/screenshots-mobile/current"
          TOKEN="${{ secrets.SLACK_BOT_TOKEN }}"
          CHANNEL="${{ secrets.SLACK_VISUAL_REGRESSION_CHANNEL_ID }}"

          upload_to_slack() {
            local filepath="$1"
            local title="$2"
            local filesize
            filesize=$(stat --printf="%s" "$filepath" 2>/dev/null || stat -f%z "$filepath")
            local filename
            filename=$(basename "$filepath")

            local url_resp
            url_resp=$(curl -s -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-type: application/x-www-form-urlencoded" \
              --data-urlencode "filename=${filename}" \
              --data-urlencode "length=${filesize}" \
              https://slack.com/api/files.getUploadURLExternal)

            local upload_url file_id
            upload_url=$(echo "$url_resp" | jq -r '.upload_url // empty')
            file_id=$(echo "$url_resp" | jq -r '.file_id // empty')

            if [ -z "$upload_url" ] || [ -z "$file_id" ]; then
              echo ""
              return
            fi

            curl -s -X POST \
              -F "file=@${filepath}" \
              "$upload_url" > /dev/null

            local complete_resp
            complete_resp=$(curl -s -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-type: application/json" \
              --data "$(jq -n --arg id "$file_id" --arg title "$title" \
                '{files: [{id: $id, title: $title}]}')" \
              https://slack.com/api/files.completeUploadExternal)

            echo "$complete_resp" | jq -r '.files[0].permalink // empty'
          }

          NL=$'\n'
          TEXT=":large_green_circle: *Auto-accepting iOS visual changes (${ENV_NAME})*${NL}"
          TEXT+="AI reviewed ${COUNT} mobile screen(s) with visual changes and approved them.${NL}"
          TEXT+="*Commit:* \`${SHA}\`${NL}"
          TEXT+="<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>${NL}"

          ITEMS=$(echo "$AI_APPROVED" | jq -c '.[]')
          while IFS= read -r item; do
            PAGE=$(echo "$item" | jq -r '.page')
            FILE="${PAGE}.png"

            TEXT+="*${PAGE}* "

            GALLERY=""
            if [ -f "$BASELINE_DIR/$FILE" ]; then
              PLINK=$(upload_to_slack "$BASELINE_DIR/$FILE" "${PAGE} — Baseline")
              [ -n "$PLINK" ] && GALLERY+="<${PLINK}| >"
            fi
            if [ -f "$CURRENT_DIR/$FILE" ]; then
              PLINK=$(upload_to_slack "$CURRENT_DIR/$FILE" "${PAGE} — Current")
              [ -n "$PLINK" ] && GALLERY+="<${PLINK}| >"
            fi

            [ -n "$GALLERY" ] && TEXT+="${NL}${GALLERY}${NL}"
          done <<< "$ITEMS"

          curl -s -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-type: application/json" \
            --data "$(jq -n --arg channel "$CHANNEL" --arg text "$TEXT" \
              '{channel: $channel, text: $text, mrkdwn: true, unfurl_links: true, unfurl_media: true}')" \
            https://slack.com/api/chat.postMessage

      - name: Promote to Latest iOS Baseline
        if: steps.mobile-ai-review.outcome != 'failure'
        run: |
          aws s3 sync \
            ${{ github.workspace }}/screenshots-mobile/current/ \
            s3://${{ secrets.VISUAL_REGRESSION_BUCKET }}/visual-regression/mobile/ios/${{ env.env_name }}/latest/ \
            --delete

      - name: Fail if iOS regressions detected
        if: steps.mobile-ai-review.outcome == 'failure'
        run: |
          echo "AI review detected iOS visual regressions"
          exit 1
