name: Mobile Fingerprint Check

# Compares the mobile EAS Update fingerprint (runtimeVersion) against the
# committed baselines (fingerprint.{ios,android}.txt = the builds live in the
# stores). On drift it posts to Slack: the native layer changed, so the change
# cannot reach existing users over OTA and a new store build is required.
# Non-blocking — it notifies, it does not fail the PR.

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL_DEPLOYMENT:
        required: false

jobs:
  mobile-fingerprint-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Check fingerprint drift
        id: fp
        working-directory: ./apps/mobile
        run: |
          set +e
          OUT=$(bun run fingerprint:check 2>&1)
          CODE=$?
          echo "$OUT"
          # The script exits 0 (no drift), 3 (drift), or anything else (failed to
          # run). Drift has its own code so a generic Node failure — which exits 1
          # — never masquerades as drift, and an infra failure never passes green.
          case "$CODE" in
            0) DRIFT=false ;;
            3) DRIFT=true ;;
            *) echo "fingerprint check failed to run (exit $CODE)" >&2; exit 1 ;;
          esac
          {
            echo "drift=$DRIFT"
            echo "details<<__FP_EOF__"
            echo "$OUT" | grep -E ' -> ' || true
            echo "__FP_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack on drift
        if: steps.fp.outputs.drift == 'true'
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_DEPLOYMENT }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          BRANCH: ${{ github.head_ref }}
          DETAILS: ${{ steps.fp.outputs.details }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "No Slack webhook configured; skipping notification."
            exit 0
          fi
          MSG=$(printf ':iphone: *Mobile native fingerprint changed* — a new App Store / Play Store build is required.\nThese changes cannot reach existing installs over OTA.\n\n*PR:* <%s|#%s %s>\n*Branch:* `%s`\n```\n%s\n```\nAfter submitting the new build(s), run `bun fingerprint:update` and commit to clear this.' \
            "$PR_URL" "$PR_NUMBER" "$PR_TITLE" "$BRANCH" "$DETAILS")
          PAYLOAD=$(jq -n --arg text "$MSG" '{text: $text}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$WEBHOOK"
