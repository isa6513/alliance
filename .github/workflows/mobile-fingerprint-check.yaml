name: Mobile Fingerprint Check

# Checks current EAS runtime fingerprint against live baselines in
# common/src/mobileFingerprints.gen.ts. Drift needs a store build; Slack notifies
# without failing PRs.

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL_DEPLOYMENT:
        required: false

jobs:
  mobile-fingerprint-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Check fingerprint drift
        id: fp
        working-directory: ./apps/mobile
        run: |
          set +e
          OUT=$(bun run fingerprint:check 2>&1)
          CODE=$?
          echo "$OUT"
          # Exit 3 means drift; other nonzero codes are tool failures.
          case "$CODE" in
            0) DRIFT=false ;;
            3) DRIFT=true ;;
            *) echo "fingerprint check failed to run (exit $CODE)" >&2; exit 1 ;;
          esac
          # Drift rows carry [needs-capture] / [awaiting-promote].
          DETAILS=$(echo "$OUT" | grep -E ' -> ' || true)
          NEEDS_CAPTURE=false
          echo "$DETAILS" | grep -q '\[needs-capture\]' && NEEDS_CAPTURE=true
          {
            echo "drift=$DRIFT"
            echo "needs_capture=$NEEDS_CAPTURE"
            echo "details<<__FP_EOF__"
            echo "$DETAILS"
            echo "__FP_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack on drift
        if: steps.fp.outputs.drift == 'true'
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_DEPLOYMENT }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          BRANCH: ${{ github.head_ref }}
          DETAILS: ${{ steps.fp.outputs.details }}
          NEEDS_CAPTURE: ${{ steps.fp.outputs.needs_capture }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "No Slack webhook configured; skipping notification."
            exit 0
          fi
          # Choose copy by whether a matching build was captured.
          # $'...' emits newlines.
          if [ "$NEEDS_CAPTURE" = "true" ]; then
            HEADLINE=$':iphone: *Mobile native fingerprint changed* — a new App Store / Play Store build is required.\nThese changes cannot reach existing installs over OTA.'
            FOOTER='At build time run `bun run fingerprint:capture <.ipa> <.aab>` (pass both platform artifacts; then they can be deleted). Once the build is live in the store, run `bun run fingerprint:promote` and commit/deploy promptly to clear this.'
          else
            HEADLINE=$':iphone: *Mobile build captured — awaiting store release.*\nThe native fingerprint is already recorded in `fingerprint-pending.gen.json`; existing installs just need this build to go live in the store.'
            FOOTER='Once the build is live in the store, run `bun run fingerprint:promote` and commit/deploy promptly to clear this.'
          fi
          MSG=$(printf '%s\n\n*PR:* <%s|#%s %s>\n*Branch:* `%s`\n```\n%s\n```\n%s' \
            "$HEADLINE" "$PR_URL" "$PR_NUMBER" "$PR_TITLE" "$BRANCH" "$DETAILS" "$FOOTER")
          PAYLOAD=$(jq -n --arg text "$MSG" '{text: $text}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$WEBHOOK"
