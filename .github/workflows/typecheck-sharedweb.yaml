name: Typecheck Sharedweb

on:
  workflow_call:

jobs:
  typecheck-sharedweb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun typecheck
        working-directory: ./sharedweb
