name: Test Common Unit

on:
  workflow_call:

jobs:
  test-common-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile
        working-directory: ./common

      - name: Run Unit Tests
        run: bun test
        working-directory: ./common
