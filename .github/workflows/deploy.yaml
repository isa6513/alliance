name: Deploy
concurrency:
  group: ${{ github.workflow }}
on:
  push:
    branches: [main]

env:
  AWS_REGION: us-west-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  CI: ""

jobs:
  test-backend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: npm ci
        working-directory: ./server

      - name: Run Jest Tests
        run: npm run test:e2e
        working-directory: ./server

  build-react-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.x
        run: corepack prepare yarn@4.9.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install Dependencies
        run: corepack yarn install --immutable
        working-directory: ./

      - name: Build React App
        run: corepack yarn workspace @alliance/frontend build
        working-directory: ./

      - name: create output folder
        run: |
          rm -rf output
          mkdir output
          mv build output/build
          cp server.js output/server.js
          cp package.json output/package.json
        working-directory: ./apps/frontend

      - name: Zip client + server
        run: |
          zip -r react-build.zip output
        working-directory: ./apps/frontend

      - name: Move Build Artifacts
        run: |
          mv apps/frontend/react-build.zip ./react-build.zip

      - name: Upload React Build to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "react-build.zip"
          target: "~/"

  build-admin-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.x
        run: corepack prepare yarn@4.9.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install Dependencies
        run: corepack yarn install --immutable
        working-directory: ./

      - name: Build React App
        run: corepack yarn workspace @alliance/admin build
        working-directory: ./

      - name: Zip Build Output
        run: zip -r admin-build.zip build/client
        working-directory: ./apps/admin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-build
          path: apps/admin/admin-build.zip

  deploy-react-app:
    runs-on: ubuntu-latest
    needs:
      - build-react-app
    steps:
      - name: SSH and Deploy frontend SSR on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo yum install -y unzip nginx
            curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
            sudo yum install -y nodejs
            sudo npm i -g pm2  

            nvm install 20
            nvm use 20
            nvm alias default 20

            cd ~/

            unzip -o ~/react-build.zip

            cd ~/output
            yarn install --omit=dev

            pm2 delete client-ssr || true
            pm2 start "yarn react-router-serve build/server/index.js" --name client-ssr
            pm2 save

            if [ ! -f /etc/nginx/conf.d/alliance.conf ]; then
              cat <<EOF | sudo tee /etc/nginx/conf.d/alliance.conf
              map $http_upgrade $connection_upgrade {
                default upgrade;
                ''	  close;
              }

              server {
                server_name ${vars.DOMAIN_NAME};

                root /home/ec2-user/output/build/client;
                index index.html;

                location ^~ /assets/ {
                  try_files $uri =404;
                  access_log off;
                  add_header Cache-Control "public, max-age=31536000, immutable";
                }

                location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Forwarded-Proto $scheme;

                }

                location /api/ {
                  proxy_pass http://localhost:3005/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
                }

                  location /socket.io/ {
                    proxy_pass         http://localhost:3005;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection $connection_upgrade;
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                }

                  listen 443 ssl http2; # managed by Certbot
                  ssl_certificate /etc/letsencrypt/live/worldalliance.org/fullchain.pem; # managed by Certbot
                  ssl_certificate_key /etc/letsencrypt/live/worldalliance.org/privkey.pem; # managed by Certbot
                  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
                  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

              }
              server {
                  if ($host = worldalliance.org) {
                      return 301 https://$host$request_uri;
                  } # managed by Certbot


                listen 80;
                server_name worldalliance.org;
                  return 404; # managed by Certbot


              }
            EOF
            fi

            sudo systemctl restart nginx

  deploy-admin-app:
    runs-on: ubuntu-latest
    needs:
      - build-admin-frontend
    steps:
      - name: Download Admin Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-build

      - name: Upload Admin Build to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "admin-build.zip"
          target: "~/"

      - name: SSH and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo yum install -y unzip nginx

            mkdir -p ~/alliance-app
            unzip -o ~/admin-build.zip -d ~/admin-app

            sudo rm -f /etc/nginx/conf.d/default.conf

            if [ ! -f /etc/nginx/conf.d/admin.conf ]; then
              cat <<EOF | sudo tee /etc/nginx/conf.d/admin.conf

              server {
                listen 80;
                server_name admin.${{vars.DOMAIN_NAME}};

                root /home/ec2-user/admin-app/build/client;
                index index.html;

                location / {
                  try_files \$uri /index.html;
                }
              }
            EOF
            fi

            chmod o+x /home/ec2-user
            chmod -R o+rx /home/ec2-user/alliance-app

            sudo systemctl restart nginx

  build-nest-backend:
    runs-on: ubuntu-latest
    needs:
      - test-backend-e2e
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci
        working-directory: ./server

      - name: Build NestJS App
        run: npm run build
        working-directory: ./server

      - name: Zip Build Output
        run: zip -r nest-build.zip dist package.json package-lock.json migrations
        working-directory: ./server

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nest-build
          path: server/nest-build.zip

  deploy-nest-backend:
    runs-on: ubuntu-latest
    needs:
      - build-nest-backend
    steps:
      - name: Download NestJS Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: nest-build

      - name: Upload NestJS Build to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "nest-build.zip"
          target: "~/"

      - name: SSH and Blue-Green Deploy on EC2 (zero-downtime)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -Eeuo pipefail

            # --- Node & PM2 setup ---
            if ! command -v nvm >/dev/null 2>&1; then
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
            fi
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20
            nvm alias default 20

            npm install -g pm2@latest

            # --- Directories ---
            BASE="$HOME/apps/nest"
            RELEASES="$BASE/releases"
            CURRENT="$BASE/current"
            ECOSYSTEM="$BASE/ecosystem.config.js"
            mkdir -p "$RELEASES"

            TS="$(date +%Y%m%d%H%M%S)"
            NEW_RELEASE="$RELEASES/$TS"
            mkdir -p "$NEW_RELEASE"

            # --- Unpack new build into a fresh release dir ---
            unzip -o "$HOME/nest-build.zip" -d "$NEW_RELEASE"

            # --- Prod deps for the new release only ---
            cd "$NEW_RELEASE"
            # If your artifact already contains node_modules, you can skip this npm install.
            NODE_OPTIONS=--max_old_space_size=800 npm install --omit=dev --max_old_space_size=800

            # --- Env shared across processes (pm2 will inject from env_production) ---
            # We’ll keep env in the ecosystem file (alternatively, write a .env and load it).
            cat > "$ECOSYSTEM" <<'EOF'
            module.exports = {
              apps: [{
                name: "nest-app",
                script: "./current/dist/src/main.js",
                cwd: process.env.HOME + "/apps/nest",
                instances: 2,
                exec_mode: "cluster",
                max_memory_restart: "600M",
                env_production: {
                  NODE_ENV: "production",
                  DB_HOST: process.env.DB_HOST,
                  DB_PORT: process.env.DB_PORT,
                  DB_USERNAME: process.env.DB_USERNAME,
                  DB_PASSWORD: process.env.DB_PASSWORD,
                  DB_NAME: "alliance",
                  JWT_SECRET: process.env.JWT_SECRET,
                  JWT_REFRESH_SECRET: process.env.JWT_REFRESH_SECRET,
                  ADMIN_USER: process.env.ADMIN_USER,
                  ADMIN_PASSWORD: process.env.ADMIN_PASSWORD,
                  SMTP_HOST: process.env.SMTP_HOST,
                  SMTP_USER: process.env.SMTP_USER,
                  SMTP_PASSWORD: process.env.SMTP_PASSWORD,
                  STRIPE_ENDPOINT_SECRET: process.env.STRIPE_ENDPOINT_SECRET,
                  STRIPE_API_KEY: process.env.STRIPE_API_KEY,
                  ASSETS_BUCKET: process.env.ASSETS_BUCKET,
                  POSTHOG_KEY: process.env.POSTHOG_KEY,
                  SINCH_PROJECT_ID: process.env.SINCH_PROJECT_ID,
                  SINCH_KEY_ID: process.env.SINCH_KEY_ID,
                  SINCH_KEY_SECRET: process.env.SINCH_KEY_SECRET,
                  SINCH_NUMBER: process.env.SINCH_NUMBER,
                  SINCH_REGION: process.env.SINCH_REGION,
                  APP_URL: process.env.APP_URL,
                  # IMPORTANT: production instance listens on 3005 behind Nginx
                  PORT: 3005
                }
              }]
            }
            EOF

            # --- Export secrets for this session so pm2 can read them when reloading ---
            export DB_HOST=${{ secrets.RDS_HOSTNAME }}
            export DB_PORT=${{ secrets.RDS_PORT }}
            export DB_USERNAME=${{ secrets.RDS_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            export NODE_ENV=production
            export DB_NAME="alliance"
            export ADMIN_USER=${{ secrets.ADMIN_USER }}
            export ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            export SMTP_HOST=${{ secrets.SMTP_HOST }}
            export SMTP_USER=${{ secrets.SMTP_USER }}
            export SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            export STRIPE_ENDPOINT_SECRET=${{ secrets.STRIPE_ENDPOINT_SECRET }}
            export STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
            export ASSETS_BUCKET=${{ secrets.ASSETS_BUCKET_NAME }}
            export POSTHOG_KEY=${{ secrets.POSTHOG_KEY }}
            export SINCH_PROJECT_ID=${{ secrets.SINCH_PROJECT_ID }}
            export SINCH_KEY_ID=${{ secrets.SINCH_KEY_ID }}
            export SINCH_KEY_SECRET=${{ secrets.SINCH_KEY_SECRET }}
            export SINCH_NUMBER=${{ secrets.SINCH_NUMBER }}
            export SINCH_REGION=${{ secrets.SINCH_REGION }}
            export APP_URL="https://${{ vars.DOMAIN_NAME }}"

            # --- Migrations against the target DB (from the new release) ---
            # If your migration:run relies on ts-node, ensure dist contains the compiled migrations or adjust the command.
            npm run migration:run || (echo "Migrations failed"; exit 1)

            # --- Canary start: run new code on a different port to verify health while old stays up ---
            # Assumes your app reads PORT from env.
            pm2 delete nest-app-canary >/dev/null 2>&1 || true
            PORT=3006 pm2 start "$NEW_RELEASE/dist/src/main.js" --name nest-app-canary --time --update-env

            # Wait for canary to boot
            sleep 8

            # Health check the canary directly on 3006 (bypassing Nginx)
            # Adjust path if your health endpoint differs.
            curl --silent --fail --show-error "http://127.0.0.1:3006/api/" > /dev/null

            # --- If canary is healthy: atomically switch "current" symlink and reload main app with zero downtime ---
            PREV_TARGET=""
            if [ -L "$CURRENT" ]; then
              PREV_TARGET="$(readlink "$CURRENT")"
            fi

            ln -sfn "$NEW_RELEASE" "$CURRENT"

            # If nest-app not started yet (first deploy), start it; otherwise reload for zero-downtime
            if pm2 describe nest-app >/dev/null 2>&1; then
              pm2 reload "$ECOSYSTEM" --env production
            else
              pm2 start   "$ECOSYSTEM" --env production
            fi

            # Give the reloaded app a moment and verify public health through Nginx on 3005
            sleep 8
            curl --silent --fail --show-error "https://${{ vars.DOMAIN_NAME }}/api/" > /dev/null

            # Success: kill the canary
            pm2 delete nest-app-canary || true
            pm2 save

            # --- Cleanup: keep only the 5 most recent releases ---
            ls -1dt "$RELEASES"/* | tail -n +6 | xargs -r rm -rf

  verify-deployment:
    needs:
      - deploy-nest-backend
      - deploy-react-app
      - deploy-admin-app
    runs-on: ubuntu-latest
    steps:
      - name: Check main app
        run: |
          echo "Checking main app..."
          curl --fail --silent --show-error http://${{vars.DOMAIN_NAME}} > /dev/null
          echo "main app is reachable"

      - name: Check admin app
        run: |
          echo "Checking admin app..."
          curl --fail --silent --show-error http://admin.${{vars.DOMAIN_NAME}} > /dev/null
          echo "admin app is reachable"
  verify-https:
    needs:
      - deploy-nest-backend
      - deploy-react-app
      - deploy-admin-app
    runs-on: ubuntu-latest
    steps:
      - name: Check main app
        run: |
          echo "Checking main app..."
          curl --fail --silent --show-error https://${{vars.DOMAIN_NAME}} > /dev/null
          echo "main app https ok"

      - name: Check admin app
        run: |
          echo "Checking admin app..."
          curl --fail --silent --show-error https://admin.${{vars.DOMAIN_NAME}} > /dev/null
          echo "admin app https ok"

  verify-api:
    needs:
      - deploy-nest-backend
      - deploy-react-app
      - deploy-admin-app
    runs-on: ubuntu-latest
    steps:
      - name: Check API health
        run: |
          echo "Checking API health..."
          curl --fail --silent --show-error https://${{vars.DOMAIN_NAME}}/api/ > /dev/null
          echo "API health ok"

  notify:
    runs-on: ubuntu-latest
    needs:
      - deploy-nest-backend
      - verify-deployment
      - verify-https
      - verify-api
    if: always()
    steps:
      - name: Post webhook if any upstream failed/cancelled
        if: ${{ contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'skipped') }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Deploy failed for ${{ github.event.head_commit.message }}. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
