name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-west-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  env_name: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
  CI: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name == 'staging' && 'staging' || 'production' }}

jobs:
  test-backend-e2e:
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: npm ci
        working-directory: ./server

      - name: Run Jest Tests
        run: npm run test:e2e
        working-directory: ./server

  build-react-app:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.x
        run: corepack prepare yarn@4.9.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install Dependencies
        run: corepack yarn install --immutable
        working-directory: ./

      - name: Build React App
        run: corepack yarn workspace @alliance/frontend build
        working-directory: ./

      - name: Inject & upload source maps to PostHog
        uses: PostHog/upload-source-maps@v0.4.6
        with:
          directory: ./apps/frontend/build/client/assets/
          env-id: ${{ secrets.POSTHOG_PROJECT_ID }}
          cli-token: ${{ secrets.POSTHOG_CLI_TOKEN }}

      - name: create output folder
        run: |
          rm -rf output
          mkdir output
          mv build output/build
          cp server.js output/server.js
          cp package.json output/package.json
        working-directory: ./apps/frontend

      - name: Zip client + server
        run: |
          zip -r react-build.zip output
        working-directory: ./apps/frontend

      - name: Move Build Artifacts
        run: |
          mv apps/frontend/react-build.zip ./react-build.zip

      - name: Upload React Build to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "react-build.zip"
          target: "~/"

  build-admin-frontend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.x
        run: corepack prepare yarn@4.9.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install Dependencies
        run: corepack yarn install --immutable
        working-directory: ./

      - name: Build React App
        run: corepack yarn workspace @alliance/admin build
        working-directory: ./

      - name: Zip Build Output
        run: zip -r admin-build.zip build/client
        working-directory: ./apps/admin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-build
          path: apps/admin/admin-build.zip

  deploy-react-app:
    runs-on: ubuntu-latest
    needs:
      - build-react-app
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: SSH and Deploy frontend SSR on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo yum install -y unzip nginx
            curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
            sudo yum install -y nodejs
            sudo npm i -g pm2  

            nvm install 20
            nvm use 20
            nvm alias default 20

            cd ~/

            unzip -o ~/react-build.zip

            cd ~/output
            yarn install --omit=dev

            pm2 delete client-ssr || true
            pm2 start "yarn react-router-serve build/server/index.js" --name client-ssr
            pm2 save

            if [ ! -f /etc/nginx/conf.d/alliance.conf ]; then
              cat <<EOF | sudo tee /etc/nginx/conf.d/alliance.conf
              map $http_upgrade $connection_upgrade {
                default upgrade;
                ''	  close;
              }

              server {
                server_name ${vars.DOMAIN_NAME};

                root /home/ec2-user/output/build/client;
                index index.html;

                location ^~ /assets/ {
                  try_files $uri =404;
                  access_log off;
                  add_header Cache-Control "public, max-age=31536000, immutable";
                }

                location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Forwarded-Proto $scheme;

                }

                location /api/ {
                  proxy_pass http://localhost:3005/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
                }

                  location /socket.io/ {
                    proxy_pass         http://localhost:3005;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection $connection_upgrade;
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                }

                  listen 443 ssl http2; # managed by Certbot
                  ssl_certificate /etc/letsencrypt/live/worldalliance.org/fullchain.pem; # managed by Certbot
                  ssl_certificate_key /etc/letsencrypt/live/worldalliance.org/privkey.pem; # managed by Certbot
                  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
                  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

              }
              server {
                  if ($host = worldalliance.org) {
                      return 301 https://$host$request_uri;
                  } # managed by Certbot


                listen 80;
                server_name worldalliance.org;
                  return 404; # managed by Certbot


              }
            EOF
            fi

            sudo systemctl restart nginx

  deploy-admin-app:
    runs-on: ubuntu-latest
    needs:
      - build-admin-frontend
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Download Admin Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-build

      - name: Upload Admin Build to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "admin-build.zip"
          target: "~/"

      - name: SSH and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo yum install -y unzip nginx

            mkdir -p ~/alliance-app
            unzip -o ~/admin-build.zip -d ~/admin-app

            sudo rm -f /etc/nginx/conf.d/default.conf

            if [ ! -f /etc/nginx/conf.d/admin.conf ]; then
              cat <<EOF | sudo tee /etc/nginx/conf.d/admin.conf

              server {
                listen 80;
                server_name admin.${{vars.DOMAIN_NAME}};

                root /home/ec2-user/admin-app/build/client;
                index index.html;

                location / {
                  try_files \$uri /index.html;
                }
              }
            EOF
            fi

            chmod o+x /home/ec2-user
            chmod -R o+rx /home/ec2-user/alliance-app

            sudo systemctl restart nginx

  build-nest-backend:
    runs-on: ubuntu-latest
    needs:
      - test-backend-e2e
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci
        working-directory: ./server

      - name: Build NestJS App
        run: npm run build
        working-directory: ./server

      - name: Zip Build Output
        run: zip -r nest-build.zip dist package.json package-lock.json migrations
        working-directory: ./server

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nest-build
          path: server/nest-build.zip

  migrations-drift-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: corepack enable

      - run: cd server && npm ci && npm run build

      - run: |
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5432" >> $GITHUB_ENV
          echo "DB_USERNAME=postgres" >> $GITHUB_ENV
          echo "DB_PASSWORD=postgres" >> $GITHUB_ENV
          echo "DB_NAME=postgres" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      - name: Run migrations on blank DB
        run: npx typeorm-ts-node-commonjs --dataSource dist/src/datasources/dataSource.js migration:run
        working-directory: ./server

      - name: Schema drift check
        id: drift
        run: |
          set -e

          OUT="$(npx typeorm-ts-node-commonjs --dataSource dist/src/datasources/dataSource.js schema:log || true)"
          echo "$OUT"

          if echo "$OUT" | grep -Eiq '^\s*(ALTER|CREATE|DROP|COMMENT|RENAME|TRUNCATE|INSERT INTO|UPDATE |DELETE FROM)\b'; then
            echo "Schema drift detected (entities != schema after migrations)."
            echo "DRIFT=1" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "No drift"
            echo "DRIFT=0" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ./server

  deploy-nest-backend:
    runs-on: ubuntu-latest
    needs:
      - build-nest-backend
      - migrations-drift-check
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Download NestJS Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: nest-build

      - name: Upload NestJS Build to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "nest-build.zip"
          target: "~/"

      - name: SSH and Deploy Backend on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -Euo pipefail
            # Install nvm and Node.js 20
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            nvm install 20
            nvm use 20
            nvm alias default 20

            cd ~/
            rm -rf nest-backend-deploy-backup || true
            mv nest-backend nest-backend-deploy-backup

            export DB_HOST=${{ secrets.RDS_HOSTNAME }}
            export DB_PORT=${{ secrets.RDS_PORT }}
            export DB_USERNAME=${{ secrets.RDS_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            export NODE_ENV=production
            export DB_NAME="alliance"
            export SMTP_HOST=${{ secrets.SMTP_HOST }}
            export SMTP_USER=${{ secrets.SMTP_USER }}
            export SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            export STRIPE_ENDPOINT_SECRET=${{ secrets.STRIPE_ENDPOINT_SECRET }}
            export STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
            export ASSETS_BUCKET=${{ secrets.ASSETS_BUCKET_NAME }}
            export POSTHOG_KEY=${{ secrets.POSTHOG_KEY }}
            export APP_URL=https://${{vars.DOMAIN_NAME}}
            export TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
            export TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            export TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            export POSTHOG_QUERY_KEY=${{ secrets.POSTHOG_QUERY_KEY }}
            export POSTHOG_PROJECT_ID=${{ secrets.POSTHOG_PROJECT_ID }}

            rollback () {
              echo "Deployment failed - rolling back"
              cd ~/
              pm2 delete nest-app || true
              if [ -d "nest-backend-deploy-backup" ]; then
                rm -rf nest-backend
                mv nest-backend-deploy-backup nest-backend
                cd nest-backend
                pm2 start dist/main.js --name nest-app || pm2 start dist/src/main.js --name nest-app
              fi
              exit 1
            }
            trap rollback ERR

            mkdir -p ~/nest-backend
            unzip -o ~/nest-build.zip -d ~/nest-backend

            cd ~/nest-backend
            NODE_OPTIONS=--max_old_space_size=800 npm install --omit=dev --max_old_space_size=800

            npm run migration:runprod

            npm install -g pm2
            pm2 delete nest-app || true
            pm2 start dist/src/main.js --name nest-app
            pm2 save

            sleep 10

            curl --silent --fail --show-error "https://${{vars.DOMAIN_NAME}}/api/" > /dev/null

  verify-deployment:
    needs:
      - deploy-nest-backend
      - deploy-react-app
      - deploy-admin-app
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Check main app
        run: |
          echo "Checking main app..."
          curl --fail --silent --show-error http://${{vars.DOMAIN_NAME}} > /dev/null
          echo "main app is reachable"

      - name: Check admin app
        run: |
          echo "Checking admin app..."
          curl --fail --silent --show-error http://admin.${{vars.DOMAIN_NAME}} > /dev/null
          echo "admin app is reachable"
  verify-https:
    needs:
      - deploy-nest-backend
      - deploy-react-app
      - deploy-admin-app
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Check main app
        run: |
          echo "Checking main app..."
          curl --fail --silent --show-error https://${{vars.DOMAIN_NAME}} > /dev/null
          echo "main app https ok"

      - name: Check admin app
        run: |
          echo "Checking admin app..."
          curl --fail --silent --show-error https://admin.${{vars.DOMAIN_NAME}} > /dev/null
          echo "admin app https ok"

  verify-api:
    needs:
      - deploy-nest-backend
      - deploy-react-app
      - deploy-admin-app
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Check API health
        run: |
          echo "Checking API health..."
          curl --fail --silent --show-error https://${{vars.DOMAIN_NAME}}/api/ > /dev/null
          echo "API health ok"

  notify:
    runs-on: ubuntu-latest
    needs:
      - deploy-nest-backend
      - verify-deployment
      - verify-https
      - verify-api
    if: always()
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Post webhook if any upstream failed/cancelled
        if: ${{ contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'skipped') }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Deploy ${{ github.ref_name == 'staging' && 'staging' || 'production' }} failed for ${{ github.event.head_commit.message }}. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
