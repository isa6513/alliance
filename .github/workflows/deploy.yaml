name: Deploy

on:
  push:
    branches: [main, production]

env:
  AWS_REGION: us-west-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  env_name: ${{ github.ref_name == 'production' && 'production' || 'staging' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name == 'production' && 'production' || 'staging' }}

jobs:
  dirty-check:
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Abort if dirty.txt has content
        if: ${{ github.ref_name == 'production' }}
        run: |
          if [ -f dirty.txt ] && [ -s dirty.txt ]; then
            echo "dirty.txt has content. Aborting."
            exit 1
          else
            echo "dirty.txt is empty or not found. Continuing."
          fi

  test-backend-e2e:
    uses: ./.github/workflows/test-backend-e2e.yaml
    with:
      environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}

  test-backend-unit:
    uses: ./.github/workflows/test-backend-unit.yaml
    with:
      environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}

  build-react-app:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Generate React Router Types
        run: bunx react-router typegen
        working-directory: ./apps/frontend

      - name: Typecheck
        run: bun typecheck
        working-directory: ./apps/frontend

      - name: Build React App
        run: bun run --cwd apps/frontend build -- --mode "$env_name"
        env:
          VITE_APP_GIT_SHA: ${{ github.sha }}
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Inject & upload source maps to PostHog
        continue-on-error: true
        uses: PostHog/upload-source-maps@v0.4.6
        with:
          directory: ./apps/frontend/build/client/assets/
          env-id: ${{ secrets.POSTHOG_PROJECT_ID }}
          cli-token: ${{ secrets.POSTHOG_SOURCEMAP_KEY }}

      - name: create output folder
        run: |
          rm -rf output
          mkdir output
          mv build output/build
          cp server.js output/server.js
          cp package.json output/package.json
          # Strip workspace:* deps and generate a standalone lockfile
          cd output
          sed -i '/workspace:\*/d' package.json
          bun install --lockfile-only
        working-directory: ./apps/frontend

      - name: Zip client + server
        run: |
          zip -r react-build.zip output
        working-directory: ./apps/frontend

      - name: Move Build Artifacts
        run: |
          mv apps/frontend/react-build.zip ./react-build.zip

      - name: Upload React Build to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "react-build.zip"
          target: "~/"

  build-admin-frontend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build React App
        run: bun run --cwd apps/admin build -- --mode "$env_name"

      - name: Zip Build Output
        run: zip -r admin-build.zip build/client
        working-directory: ./apps/admin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-build
          path: apps/admin/admin-build.zip

  typecheck-frontend:
    uses: ./.github/workflows/typecheck-frontend.yaml

  typecheck-admin:
    uses: ./.github/workflows/typecheck-admin.yaml

  typecheck-mobile:
    uses: ./.github/workflows/typecheck-mobile.yaml

  typecheck-server:
    uses: ./.github/workflows/typecheck-server.yaml

  typecheck-common:
    uses: ./.github/workflows/typecheck-common.yaml

  typecheck-shared:
    uses: ./.github/workflows/typecheck-shared.yaml

  typecheck-sharedweb:
    uses: ./.github/workflows/typecheck-sharedweb.yaml

  deploy-react-app:
    runs-on: ubuntu-latest
    needs:
      - build-react-app
      - dirty-check
      - test-backend-e2e
      - test-backend-unit
      - migrations-drift-check
      - typecheck-frontend
      - typecheck-admin
      - typecheck-mobile
      - typecheck-server
      - typecheck-common
      - typecheck-shared
      - typecheck-sharedweb
      - visual-regression
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload nginx vhost to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/nginx/alliance.conf"
          target: "~/"
          strip_components: 2

      - name: SSH and Deploy frontend SSR on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo yum install -y unzip nginx

            # Install Bun
            BUN_VERSION=1.3.6
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if [ "$(bun --version 2>/dev/null)" != "$BUN_VERSION" ]; then
              curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
            fi
            bun --version | grep -qx "$BUN_VERSION" || { echo "bun $BUN_VERSION required, got $(bun --version 2>/dev/null || echo none)"; exit 1; }

            # Node is needed for pm2.
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] || { echo "nvm missing ($NVM_DIR/nvm.sh) — provision node on this host before deploying"; exit 1; }
            \. "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            nvm alias default 22
            command -v node &> /dev/null || { echo "node missing after nvm setup"; exit 1; }
            command -v pm2 &> /dev/null || bun add -g pm2

            cd ~/

            unzip -o ~/react-build.zip

            cd ~/output
            # node_modules isn't in the zip; clear it so the frozen install
            # builds a clean tree
            rm -rf node_modules
            # appleboy/ssh-action runs this script without `set -e`
            # Make it fatal explicitly.
            bun install --frozen-lockfile --production || { echo "bun install failed"; exit 1; }

            pm2 delete client-ssr || true
            pm2 start "NODE_ENV=${{ github.ref_name == 'production' && 'production' || 'staging' }} node server.js" --name client-ssr
            pm2 save

            # Source of truth is deploy/nginx/alliance.conf, uploaded to
            # ~/alliance.conf; substitute the per-environment domain into
            # server_name + cert paths.
            sed "s/__DOMAIN__/${{ vars.DOMAIN_NAME }}/g" ~/alliance.conf \
              | sudo tee /etc/nginx/conf.d/alliance.conf > /dev/null
            sudo nginx -t || { echo "nginx config invalid"; exit 1; }
            sudo systemctl reload nginx

  deploy-admin-app:
    runs-on: ubuntu-latest
    needs:
      - dirty-check
      - build-admin-frontend
      - visual-regression
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    steps:
      - name: Download Admin Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-build

      - name: Upload Admin Build to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "admin-build.zip"
          target: "~/"

      - name: SSH and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo yum install -y unzip nginx

            unzip -o ~/admin-build.zip -d ~/admin-app

            sudo rm -f /etc/nginx/conf.d/default.conf

            if [ ! -f /etc/nginx/conf.d/admin.conf ]; then
              cat <<EOF | sudo tee /etc/nginx/conf.d/admin.conf

              server {
                listen 80;
                server_name admin.${{vars.DOMAIN_NAME}};

                root /home/ec2-user/admin-app/build/client;
                index index.html;

                location / {
                  try_files \$uri /index.html;
                }
              }
            EOF
            fi

            chmod o+x /home/ec2-user

            sudo systemctl restart nginx

  migrations-drift-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: cd server && bun install --frozen-lockfile

      - run: cd common && bun install --frozen-lockfile

      - run: PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
        working-directory: ./server

      - run: |
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5432" >> $GITHUB_ENV
          echo "DB_USERNAME=postgres" >> $GITHUB_ENV
          echo "DB_PASSWORD=postgres" >> $GITHUB_ENV
          echo "DB_NAME=postgres" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      - name: Run migrations on blank DB
        run: bunx typeorm-ts-node-commonjs --dataSource src/datasources/dataSource.ts migration:run
        working-directory: ./server

      - name: Schema drift check
        id: drift
        run: |
          set -e

          OUT="$(bunx typeorm-ts-node-commonjs --dataSource src/datasources/dataSource.ts schema:log || true)"
          echo "$OUT"

          if echo "$OUT" | grep -Eiq '^\s*(ALTER|CREATE|DROP|COMMENT|RENAME|TRUNCATE|INSERT INTO|UPDATE |DELETE FROM)\b'; then
            echo "Schema drift detected (entities != schema after migrations)."
            echo "DRIFT=1" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "No drift"
            echo "DRIFT=0" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ./server

  visual-regression:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        if: github.ref_name == 'production'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install monorepo dependencies
        if: github.ref_name == 'production'
        run: bun install --frozen-lockfile

      - name: Install Backend Dependencies
        if: github.ref_name == 'production'
        run: bun install --frozen-lockfile
        working-directory: ./server

      - name: Install @alliance/common dependencies
        if: github.ref_name == 'production'
        run: bun install --frozen-lockfile
        working-directory: ./common

      - name: Cache Playwright Browsers
        if: github.ref_name == 'production'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright
        if: github.ref_name == 'production' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Take Screenshots
        if: github.ref_name == 'production'
        run: bun run --cwd citesting take
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: citesting
          ASSETS_BUCKET: ${{ secrets.CI_ASSETS_BUCKET }}
          NODE_ENV: test
          SCREENSHOT_OUTPUT_DIR: ${{ github.workspace }}/screenshots/current

      - name: Upload Current Screenshots to S3
        if: github.ref_name == 'production'
        run: |
          aws s3 sync \
            ${{ github.workspace }}/screenshots/current/ \
            s3://${{ secrets.VISUAL_REGRESSION_BUCKET }}/visual-regression/${{ env.env_name }}/${{ github.sha }}/

      - name: Download Baseline from S3
        if: github.ref_name == 'production'
        run: |
          mkdir -p ${{ github.workspace }}/screenshots/baseline
          aws s3 sync \
            s3://${{ secrets.VISUAL_REGRESSION_BUCKET }}/visual-regression/${{ env.env_name }}/latest/ \
            ${{ github.workspace }}/screenshots/baseline/ \
            || echo "No baseline found — first run"

      - name: Compare Screenshots
        if: github.ref_name == 'production'
        run: |
          BASELINE=${{ github.workspace }}/screenshots/baseline
          if [ "$(ls -A "$BASELINE" 2>/dev/null)" ]; then
            bun run --cwd citesting compare \
              "$BASELINE" \
              ${{ github.workspace }}/screenshots/current \
              ${{ github.workspace }}/screenshots/diffs
          else
            echo "No baseline screenshots — skipping comparison"
          fi

      - name: AI Review
        if: github.ref_name == 'production'
        id: ai-review
        continue-on-error: true
        run: |
          BASELINE=${{ github.workspace }}/screenshots/baseline
          if [ "$(ls -A "$BASELINE" 2>/dev/null)" ]; then
            bun run --cwd citesting ai-review \
              "$BASELINE" \
              ${{ github.workspace }}/screenshots/current \
              ${{ github.workspace }}/screenshots/diffs
          else
            echo "No baseline — skipping AI review"
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_REVIEW_OUTPUT: ${{ github.workspace }}/screenshots/ai-review-results.json

      - name: Notify Slack on Visual Regression
        if: github.ref_name == 'production' && steps.ai-review.outcome == 'failure'
        run: |
          RESULTS="${{ github.workspace }}/screenshots/ai-review-results.json"
          SHA="${{ github.sha }}"
          ENV_NAME="${{ env.env_name }}"
          BASELINE_DIR="${{ github.workspace }}/screenshots/baseline"
          CURRENT_DIR="${{ github.workspace }}/screenshots/current"
          TOKEN="${{ secrets.SLACK_BOT_TOKEN }}"
          CHANNEL="${{ secrets.SLACK_DEPLOY_CHANNEL_ID }}"

          # Upload a file to Slack via v2 API (without channel) and return its permalink
          upload_to_slack() {
            local filepath="$1"
            local title="$2"
            local filesize
            filesize=$(stat --printf="%s" "$filepath" 2>/dev/null || stat -f%z "$filepath")
            local filename
            filename=$(basename "$filepath")

            local url_resp
            url_resp=$(curl -s -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-type: application/x-www-form-urlencoded" \
              --data-urlencode "filename=${filename}" \
              --data-urlencode "length=${filesize}" \
              https://slack.com/api/files.getUploadURLExternal)

            local upload_url file_id
            upload_url=$(echo "$url_resp" | jq -r '.upload_url // empty')
            file_id=$(echo "$url_resp" | jq -r '.file_id // empty')

            if [ -z "$upload_url" ] || [ -z "$file_id" ]; then
              echo ""
              return
            fi

            curl -s -X POST \
              -F "file=@${filepath}" \
              "$upload_url" > /dev/null

            local complete_resp
            complete_resp=$(curl -s -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-type: application/json" \
              --data "$(jq -n --arg id "$file_id" --arg title "$title" \
                '{files: [{id: $id, title: $title}]}')" \
              https://slack.com/api/files.completeUploadExternal)

            echo "$complete_resp" | jq -r '.files[0].permalink // empty'
          }

          APPROVE_URL="${{ github.server_url }}/${{ github.repository }}/actions/workflows/approve-visual-baseline.yaml?environment=${ENV_NAME}&sha=${SHA}"

          NL=$'\n'
          TEXT=":red_circle: *Visual Regression Detected (${ENV_NAME})*${NL}"
          TEXT+="${ENV_NAME^} deploy blocked by visual regression check.${NL}"
          TEXT+="*Commit:* \`${SHA}\`${NL}"
          TEXT+="<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>  |  <${APPROVE_URL}|Approve baseline>${NL}"

          FAILURES=$(cat "$RESULTS" | jq -c '.[] | select(.status == "fail")')
          while IFS= read -r fail; do
            PAGE=$(echo "$fail" | jq -r '.page')
            FILE="${PAGE}.png"

            TEXT+="${NL}*${PAGE}*${NL}"

            GALLERY=""
            if [ -f "$BASELINE_DIR/$FILE" ]; then
              PLINK=$(upload_to_slack "$BASELINE_DIR/$FILE" "${PAGE} — Baseline")
              [ -n "$PLINK" ] && GALLERY+="<${PLINK}| >"
            fi
            if [ -f "$CURRENT_DIR/$FILE" ]; then
              PLINK=$(upload_to_slack "$CURRENT_DIR/$FILE" "${PAGE} — Current")
              [ -n "$PLINK" ] && GALLERY+="<${PLINK}| >"
            fi

            [ -n "$GALLERY" ] && TEXT+="${NL}${GALLERY}${NL}"
          done <<< "$FAILURES"

          curl -s -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-type: application/json" \
            --data "$(jq -n --arg channel "$CHANNEL" --arg text "$TEXT" \
              '{channel: $channel, text: $text, mrkdwn: true, unfurl_links: true, unfurl_media: true}')" \
            https://slack.com/api/chat.postMessage

      - name: Notify Slack on AI-Approved Changes
        if: github.ref_name == 'production' && steps.ai-review.outcome != 'failure'
        run: |
          RESULTS="${{ github.workspace }}/screenshots/ai-review-results.json"

          # Exit early if no results file or no AI-reviewed passes
          if [ ! -f "$RESULTS" ]; then
            echo "No results file — nothing to notify"
            exit 0
          fi

          AI_APPROVED=$(cat "$RESULTS" | jq -c '[.[] | select(.aiReviewed == true and .status == "pass")]')
          COUNT=$(echo "$AI_APPROVED" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No AI-reviewed changes — skipping notification"
            exit 0
          fi

          SHA="${{ github.sha }}"
          ENV_NAME="${{ env.env_name }}"
          BASELINE_DIR="${{ github.workspace }}/screenshots/baseline"
          CURRENT_DIR="${{ github.workspace }}/screenshots/current"
          TOKEN="${{ secrets.SLACK_BOT_TOKEN }}"
          CHANNEL="${{ secrets.SLACK_VISUAL_REGRESSION_CHANNEL_ID }}"

          upload_to_slack() {
            local filepath="$1"
            local title="$2"
            local filesize
            filesize=$(stat --printf="%s" "$filepath" 2>/dev/null || stat -f%z "$filepath")
            local filename
            filename=$(basename "$filepath")

            local url_resp
            url_resp=$(curl -s -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-type: application/x-www-form-urlencoded" \
              --data-urlencode "filename=${filename}" \
              --data-urlencode "length=${filesize}" \
              https://slack.com/api/files.getUploadURLExternal)

            local upload_url file_id
            upload_url=$(echo "$url_resp" | jq -r '.upload_url // empty')
            file_id=$(echo "$url_resp" | jq -r '.file_id // empty')

            if [ -z "$upload_url" ] || [ -z "$file_id" ]; then
              echo ""
              return
            fi

            curl -s -X POST \
              -F "file=@${filepath}" \
              "$upload_url" > /dev/null

            local complete_resp
            complete_resp=$(curl -s -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-type: application/json" \
              --data "$(jq -n --arg id "$file_id" --arg title "$title" \
                '{files: [{id: $id, title: $title}]}')" \
              https://slack.com/api/files.completeUploadExternal)

            echo "$complete_resp" | jq -r '.files[0].permalink // empty'
          }

          NL=$'\n'
          TEXT=":large_green_circle: *Auto-accepting visual changes to production*${NL}"
          TEXT+="AI reviewed ${COUNT} page(s) with visual changes and approved them.${NL}"
          TEXT+="*Commit:* \`${SHA}\`${NL}"
          TEXT+="<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>${NL}"

          ITEMS=$(echo "$AI_APPROVED" | jq -c '.[]')
          while IFS= read -r item; do
            PAGE=$(echo "$item" | jq -r '.page')
            FILE="${PAGE}.png"

            TEXT+="*${PAGE}* "

            GALLERY=""
            if [ -f "$BASELINE_DIR/$FILE" ]; then
              PLINK=$(upload_to_slack "$BASELINE_DIR/$FILE" "${PAGE} — Baseline")
              [ -n "$PLINK" ] && GALLERY+="<${PLINK}| >"
            fi
            if [ -f "$CURRENT_DIR/$FILE" ]; then
              PLINK=$(upload_to_slack "$CURRENT_DIR/$FILE" "${PAGE} — Current")
              [ -n "$PLINK" ] && GALLERY+="<${PLINK}| >"
            fi

            [ -n "$GALLERY" ] && TEXT+="${NL}${GALLERY}${NL}"
          done <<< "$ITEMS"

          curl -s -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-type: application/json" \
            --data "$(jq -n --arg channel "$CHANNEL" --arg text "$TEXT" \
              '{channel: $channel, text: $text, mrkdwn: true, unfurl_links: true, unfurl_media: true}')" \
            https://slack.com/api/chat.postMessage

      - name: Promote to Latest Baseline
        if: github.ref_name == 'production' && steps.ai-review.outcome != 'failure'
        run: |
          aws s3 sync \
            ${{ github.workspace }}/screenshots/current/ \
            s3://${{ secrets.VISUAL_REGRESSION_BUCKET }}/visual-regression/${{ env.env_name }}/latest/ \
            --delete

      - name: Fail if regressions detected
        if: github.ref_name == 'production' && steps.ai-review.outcome == 'failure'
        run: |
          echo "AI review detected visual regressions — blocking deploy"
          exit 1

  deploy-nest-backend:
    runs-on: ubuntu-latest
    needs:
      - dirty-check
      - test-backend-e2e
      - test-backend-unit
      - build-react-app
      - migrations-drift-check
      - typecheck-frontend
      - typecheck-admin
      - typecheck-mobile
      - typecheck-server
      - typecheck-common
      - typecheck-shared
      - typecheck-sharedweb
      - visual-regression
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Zip backend deploy workspace
        run: |
          rm -f nest-build.zip
          zip -r nest-build.zip \
            package.json \
            bun.lock \
            bunfig.toml \
            tsconfig.base.json \
            server/package.json \
            server/tsconfig.json \
            server/src \
            server/migrations \
            common/package.json \
            common/tsconfig.json \
            common/src \
            apps/admin/package.json \
            apps/frontend/package.json \
            apps/mobile/package.json \
            citesting/package.json \
            shared/package.json \
            sharedweb/package.json

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "nest-build.zip"
          target: "~/"

      - name: SSH and Deploy Backend on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -Euo pipefail

            # Install Bun
            BUN_VERSION=1.3.6
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if [ "$(bun --version 2>/dev/null)" != "$BUN_VERSION" ]; then
              curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
            fi
            bun --version | grep -qx "$BUN_VERSION" || { echo "bun $BUN_VERSION required, got $(bun --version 2>/dev/null || echo none)"; exit 1; }

            # Node is needed for pm2.
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] || { echo "nvm missing ($NVM_DIR/nvm.sh) — provision node on this host before deploying"; exit 1; }
            \. "$NVM_DIR/nvm.sh"
            command -v node &> /dev/null || { echo "node missing after nvm setup"; exit 1; }
            command -v pm2 &> /dev/null || bun add -g pm2

            cd ~/

            export DB_HOST=${{ secrets.RDS_HOSTNAME }}
            export DB_PORT=${{ secrets.RDS_PORT }}
            export DB_USERNAME=${{ secrets.RDS_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            export NODE_ENV=${{ github.ref_name == 'production' && 'production' || 'staging' }}
            export DB_NAME="alliance"
            export SMTP_HOST=${{ secrets.SMTP_HOST }}
            export SMTP_USER=${{ secrets.SMTP_USER }}
            export SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            export STRIPE_ENDPOINT_SECRET=${{ secrets.STRIPE_ENDPOINT_SECRET }}
            export STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
            export ASSETS_BUCKET=${{ secrets.ASSETS_BUCKET_NAME }}
            export POSTHOG_KEY=${{ secrets.POSTHOG_KEY }}
            export APP_URL=https://${{vars.DOMAIN_NAME}}
            export TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
            export TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            export TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            export POSTHOG_QUERY_KEY=${{ secrets.POSTHOG_QUERY_KEY }}
            export POSTHOG_PROJECT_ID=${{ secrets.POSTHOG_PROJECT_ID }}
            export MAILGUN_SIGNING_KEY=${{ secrets.MAILGUN_SIGNING_KEY }}
            export NOTIF_TEST_PHONE_NUMBER=${{ secrets.NOTIF_TEST_PHONE_NUMBER }}
            export NOTIF_TEST_EMAIL=${{ secrets.NOTIF_TEST_EMAIL }}
            export USE_CLOUDFRONT=${{ vars.USE_CLOUDFRONT }}
            export CLOUDFRONT_DOMAIN=${{ secrets.CLOUDFRONT_DOMAIN }}
            export SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
            export DB_CA_CERT="${{ secrets.DB_CA_CERT }}"
            export PANGRAM_API_KEY=${{ secrets.PANGRAM_API_KEY }}
            export PANGRAM_API_URL=https://text.api.pangram.com/v3
            export TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
            export EXPO_ACCESS_TOKEN=${{ secrets.EXPO_ACCESS_TOKEN }}

            rm -rf nest-backend-deploy-backup || true
            mv nest-backend nest-backend-deploy-backup || true

            rollback () {
              trap - ERR
              echo "Deployment failed - rolling back"
              cd ~/
              pm2 delete nest-app || true
              if [ -d "nest-backend-deploy-backup" ]; then
                rm -rf nest-backend
                mv nest-backend-deploy-backup nest-backend
                cd ~/nest-backend/server
                pm2 start "bun src/main.ts" --name nest-app --interpreter none
              fi
              exit 1
            }
            trap rollback ERR

            mkdir -p ~/nest-backend
            unzip -o ~/nest-build.zip -d ~/nest-backend

            cd ~/nest-backend
            bun install --frozen-lockfile

            cd ~/nest-backend/server
            # Run migrations
            bunx typeorm-ts-node-commonjs --dataSource src/datasources/dataSource.ts migration:run

            pm2 delete nest-app || true
            pm2 start "bun src/main.ts" --name nest-app --interpreter none
            pm2 save

            sleep 10
            curl --silent --fail --show-error "https://${{vars.DOMAIN_NAME}}/api/" > /dev/null

  verify-deployment:
    needs:
      - deploy-nest-backend
      - deploy-react-app
      - deploy-admin-app
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    steps:
      - name: Check main app
        run: |
          echo "Checking main app..."
          curl --fail --silent --show-error http://${{vars.DOMAIN_NAME}} > /dev/null
          echo "main app is reachable"

      - name: Check admin app
        run: |
          echo "Checking admin app..."
          curl --fail --silent --show-error http://admin.${{vars.DOMAIN_NAME}} > /dev/null
          echo "admin app is reachable"
  verify-https:
    needs:
      - deploy-nest-backend
      - deploy-react-app
      - deploy-admin-app
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    steps:
      - name: Check main app
        run: |
          echo "Checking main app..."
          curl --fail --silent --show-error https://${{vars.DOMAIN_NAME}} > /dev/null
          echo "main app https ok"

      - name: Check admin app
        run: |
          echo "Checking admin app..."
          curl --fail --silent --show-error https://admin.${{vars.DOMAIN_NAME}} > /dev/null
          echo "admin app https ok"

  verify-api:
    needs:
      - deploy-nest-backend
      - deploy-react-app
      - deploy-admin-app
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    steps:
      - name: Check API health
        run: |
          echo "Checking API health..."
          curl --fail --silent --show-error https://${{vars.DOMAIN_NAME}}/api/ > /dev/null
          echo "API health ok"

  notify:
    runs-on: ubuntu-latest
    needs:
      - deploy-nest-backend
      - verify-deployment
      - verify-https
      - verify-api
    if: always()
    environment: ${{ github.ref_name == 'production' && 'production' || 'staging' }}
    steps:
      - name: Compute Slack mention
        id: slack_mention
        run: |
          AUTHOR="${{ github.event.head_commit.author.username }}"
          MENTION=""

          if [ "$AUTHOR" = "charleslien" ]; then
            MENTION="<@U0A0WQQM8HZ>"
          fi

          echo "mention=$MENTION" >> "$GITHUB_OUTPUT"

      - name: Post webhook if any upstream failed/cancelled
        if: ${{ contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'skipped') }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${{ steps.slack_mention.outputs.mention }} Deploy ${{ github.ref_name == 'production' && 'production' || 'staging' }} failed for ${{ github.event.head_commit.message }}. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL_DEPLOYMENT }}

  # Publishes an over-the-air JS/asset update to the production EAS Update
  # channel. Only JS/asset changes ship this way; native changes still require a
  # store build (the fingerprint runtimeVersion guards compatibility). Runs only
  # on the production branch, after the backend is live so the OTA bundle never
  # talks to an API older than itself.
  publish-mobile-ota:
    runs-on: ubuntu-latest
    needs:
      - deploy-nest-backend
    if: ${{ github.ref_name == 'production' }}
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Publish EAS Update
        run: bunx eas-cli@16.5.0 update --branch production --message "$COMMIT_MESSAGE" --non-interactive
        working-directory: ./apps/mobile
        env:
          # `eas update` ignores eas.json build profiles, so pin the variant
          # here. Must resolve the same app config as the production store build,
          # or the fingerprint runtimeVersion won't match any installed build and
          # the OTA never applies.
          APP_VARIANT: production
          EXPO_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
