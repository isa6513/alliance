name: Test Backend E2E

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string

jobs:
  test-backend-e2e:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Backend Dependencies
        run: bun install --frozen-lockfile
        working-directory: ./server

      - name: Install @alliance/common dependencies
        run: bun install --frozen-lockfile
        working-directory: ./common

      - name: Run E2E Tests
        run: bun run test:e2e
        working-directory: ./server
