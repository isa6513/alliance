name: Claude Commit Review
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diffs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show commit context
        run: |
          echo "Commit: ${{ github.sha }}"
          git --no-pager show --name-status --pretty=fuller ${{ github.sha }} > commit_show.txt
          git --no-pager diff --binary ${{ github.sha }}^! > diff.patch
          echo "Generated diff.patch ($(wc -c < diff.patch) bytes)"

      - name: Run Claude on this commit
        id: claude
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(git:*),View,GlobTool,GrepTool,BatchTool"
          max_turns: 30
          prompt: |
            You are a CI code reviewer for commit ${{ github.sha }} on branch "main".
            Tasks:
            1) Run `git diff ${{ github.sha }}^!` and review only this patch in the context of the repo.
            2) Look through the codebase and see if any major problems with the commit stand out. In most cases, no problems will exist, but if it looks like the commit author might be overlooking something or needs to check some edge case, call that out. Spend some time looking through the codebase to verify your findings.
            3) Output a final message with 3 sentences or less of your concise thoughts. Write conversationally, with no title. Do not summarize the commit, just address any changes needed. End the message with the phrase "[NEEDS_ATTENTION]" if there is a significant issue or possible improvement that the author should address. If everything is fine, do not include this phrase.

      - name: Extract Claude summary + NEEDS_REVIEW flag
        id: extract_claude
        run: |
          FILE=/home/runner/work/_temp/claude-execution-output.json

          # Grab the last assistant text block (empty string if none)
          summary="$(
            jq -r '
              reverse
              | map(select(.message.role == "assistant"))
              | map(.message.content[]? | select(.type == "text"))
              | (.[0].text // "")
            ' "$FILE"
          )"

          delim="EOF_$(date +%s%N)"
          {
            echo "summary<<$delim"
            printf "%s\n" "$summary"
            echo "$delim"
          } | sed 's|['\''"]||g' >> "$GITHUB_OUTPUT"

          echo "$summary"

          needs_review=$([[ "$summary" =~ NEEDS_ATTENTION ]] && echo "true" || echo "false")

          echo "$needs_review"
          echo "needs_review=$needs_review" >> "$GITHUB_OUTPUT"

      - name: Build Slack payload (needs review)
        id: slack_body_review
        if: ${{ steps.extract_claude.outputs.needs_review == 'true' }}
        env:
          SUMMARY: ${{ steps.extract_claude.outputs.summary }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -nc \
            --arg url "$RUN_URL" \
            --arg summary "$SUMMARY" \
            '{
              text: "review given",
              blocks: [
                { "type": "section", "text": { "type": "mrkdwn", "text": $summary } },
                { "type": "actions", "elements": [
                    { "type": "button", "text": { "type": "plain_text", "text": "Open run" }, "url": $url }
                  ] }
              ]
            }' > slack.json

          {
            echo "payload<<EOF"
            cat slack.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack (NEEDS_REVIEW)
        if: ${{ steps.extract_claude.outputs.needs_review == 'true' && (success() || failure()) }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data '${{ steps.slack_body_review.outputs.payload }}' \
            "${{ secrets.SLACK_WEBHOOK_URL_CLA }}"
