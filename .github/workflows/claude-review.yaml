name: Claude Commit Review
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diffs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show commit context
        run: |
          echo "Commit: ${{ github.sha }}"
          git --no-pager show --name-status --pretty=fuller ${{ github.sha }} > commit_show.txt
          git --no-pager diff --binary ${{ github.sha }}^! > diff.patch
          echo "Generated diff.patch ($(wc -c < diff.patch) bytes)"

      - name: Run Claude on this commit
        id: claude
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(git:*),View,GlobTool,GrepTool,BatchTool"
          prompt: |
            You are a CI code reviewer for commit ${{ github.sha }} on branch "main".
            Tasks:
            1) Run `git diff ${{ github.sha }}^!` and review only this patch in the context of the repo.
            2) Look through the codebase and see if any major problems with the commit stand out. In most cases, no problems will exist, but if it looks like the commit author might be overlooking something or needs to check some edge case, call that out.
            3) Output:
               - Summary (3-8 bullets)
               - File-by-file remarks (only touched files)
               - Required actions (checklist)
               - Verdict: Include in your review "[NEEDS_REVIEW]" if the commit author needs to look at your review. If everything is fine, do not include this phrase.
          claude_args: |
            --max-turns 12
            --allowedTools "Bash(git diff:*)" "Bash(git show:*)" "Read" "Grep" "Glob"

      - name: Build Slack payload
        id: slack_body
        run: |
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-/dev/null}"
          echo "Run URL: $RUN_URL"
          # Fallback message if no summary exists:
          TITLE="Claude review for ${GITHUB_REF_NAME}@${{ github.sha }}"
          MSG="View the run summary for full feedback: ${RUN_URL}"
          # Construct a compact JSON payload for Slack Incoming Webhook
          jq -nc --arg title "$TITLE" --arg msg "$MSG" --arg url "$RUN_URL" '{
            text: $title,
            blocks: [
              { "type": "header", "text": { "type": "plain_text", "text": $title } },
              { "type": "section", "text": { "type": "mrkdwn", "text": $msg } },
              { "type": "actions", "elements": [
                  { "type": "button", "text": { "type": "plain_text", "text": "Open run" }, "url": $url }
                ] }
            ]
          }' > slack.json
          echo "payload=$(cat slack.json)" >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        if: ${{ success() || failure() }} # always attempt
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data '${{ steps.slack_body.outputs.payload }}' \
            "${{ secrets.SLACK_WEBHOOK_URL_CLA }}"
