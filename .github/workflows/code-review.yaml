name: commit review

on:
  push:
    branches-ignore:
      - production
      - auto-fix/**

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    if: ${{ !contains(github.event.head_commit.message, 'Merge branch') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Remove AGENTS.md and CLAUDE.md before review
        run: |
          set -euo pipefail
          rm -f AGENTS.md CLAUDE.md

      # --- Claude Code (Anthropic) ---

      - name: Setup Node (for installing Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm i -g @anthropic-ai/claude-code

      - name: Run Claude Code (headless, Opus)
        id: run_claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail

          prompt_file="$(mktemp)"
          cat > "$prompt_file" <<'PROMPT'
          This is commit for ${{ github.repository }}.
          Commit SHA: ${{ github.sha }}

          1) Run `git diff ${{ github.sha }}^!` and review only this patch in the context of the repo.

          Review only the changes introduced by the commit.
          Suggest any improvements, potential bugs, or issues. Attend to high level direction also, such as if there might be a better way to accomplish the same objective.

          Output a final message with your concise thoughts. Be sure to separate this from your other output as a new message so only the review is sent. Do not summarize the commit, just write one short bullet point for each specific issue you found, if any. Do not list things that do not need fixing. End the message with the phrase "[NEEDS_ATTENTION]" if there is a significant issue or possible improvement that the author should address. If everything is fine, do not include this phrase.
          Only output [NEEDS_ATTENTION] if you are highly confident there is a substantial issue. Look around at related files to make sure you arent missing anything before doing so. If the changes remove a feature or affordance but this removal was clearly intentional by the author, this does not need attention. Do not leave comments of the form "verify that x" or "x needs to be tested" - these are not code issues. Include full file paths from repository root as well as line numbers for applicable issues in your review.
          ${{ (github.ref_name == 'main' || github.ref_name == 'staging' || github.ref_name == 'production') && '' || 'This is a WIP feature branch, do not comment on unimplemented features or clearly in-progress areas.' }}
          PROMPT

          raw_json="$(
            claude -p "$(cat "$prompt_file")" \
              --output-format json \
              --model claude-opus-4-6 \
              --allowedTools "Read,Bash(git diff:*),Bash(git show:*),Bash(git status:*),Bash(git log:*)" \
              --max-turns 12
          )"

          final_message="$(printf "%s" "$raw_json" | jq -r '.result // ""')"

          delim="EOF_$(date +%s%N)"
          {
            echo "final_message<<$delim"
            printf "%s\n" "$final_message"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      # --- OpenAI codex-action (original review) ---

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            This is commit for ${{ github.repository }}.
            Commit SHA: ${{ github.sha }}

            1) Run `git diff ${{ github.sha }}^!` and review only this patch in the context of the repo.

            Review ONLY the changes introduced by the commit.
            Suggest any improvements, potential bugs, or issues. Attend to high level direction also, such as if there might be a better way to accomplish the same objective.

            Output a final message with your concise thoughts. Do not summarize the commit, just write one short bullet point for each specific issue you found, if any. End the message with the phrase "[NEEDS_ATTENTION]" if there is a significant issue or possible improvement that the author should address. If everything is fine, do not include this phrase.
            Only output [NEEDS_ATTENTION] if you are highly confident there is a substantial issue. Look around at related files to make sure you arent missing anything before doing so. If the changes remove a feature or affordance but this removal was clearly intentional by the author, this does not need attention. Do not leave comments of the form "verify that x" or "x needs to be tested" - these are not code issues.
            Include full file paths from repository root as well as line numbers for applicable issues in your review.
            ${{ (github.ref_name == 'main' || github.ref_name == 'staging' || github.ref_name == 'production') && '' || 'This is a WIP feature branch, do not comment on unimplemented features or clearly in-progress areas.' }}

      - name: Combine reviews with OpenAI
        id: combine_reviews
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_FINAL_MESSAGE: ${{ steps.run_claude.outputs.final_message }}
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        run: |
          set -euo pipefail

          claude="${CLAUDE_FINAL_MESSAGE:-}"
          codex="${CODEX_FINAL_MESSAGE:-}"

          # If both are empty, nothing to do
          if [ -z "$claude" ] && [ -z "$codex" ]; then
            {
              echo "combined_final_message="
              echo "needs_review=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If only *one* review has content, just use that directly
          if [ -z "$claude" ] && [ -n "$codex" ]; then
            combined="$codex"
          elif [ -n "$claude" ] && [ -z "$codex" ]; then
            combined="$claude"
          else
            # Both have content: call OpenAI to merge them
            instructions="You are merging two automated code review outputs into a single concise list of issues. Keep only real, actionable issues, but prune any preamble or commentary. Merge duplicates. Output a markdown bullet list where each bullet is one issue. If there is at least one substantive issue, end the response with the exact text [NEEDS_ATTENTION]. Otherwise do not include that text. Be sure to preserve full file paths and line numbers listed.

            If both reviews indicate that there are no issues (for example, they are empty, say there are no issues, or only contain pleasantries), then respond with an empty string and do NOT invent any meta-commentary (such as complaining about missing content)."

            payload="$(jq -nc \
              --arg instructions "$instructions" \
              --arg claude "$claude" \
              --arg codex "$codex" \
              '{
                model: "gpt-5.2",
                messages: [
                  { "role": "developer", "content": $instructions },
                  {
                    "role": "user",
                    "content": ("Claude review:\n" + $claude + "\n\nOpenAI review:\n" + $codex)
                  }
                ]
              }')"

            response="$(
              curl -sS https://api.openai.com/v1/chat/completions \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -d "$payload"
            )"

            echo "Response:"
            echo "----------"
            printf '%s\n' "$response"

            combined="$(printf "%s" "$response" | jq -r '.choices[0].message.content // ""')"
          fi

          echo "Combined review:"
          echo "----------------"
          printf '%s\n' "$combined"

          # Compute needs_review flag based on presence of [NEEDS_ATTENTION]
          if printf '%s\n' "$combined" | grep -q 'NEEDS_ATTENTION'; then
            needs_review="true"
          else
            needs_review="false"
          fi

          # Expose as step outputs
          delim="EOF_$(date +%s%N)"
          {
            echo "combined_final_message<<$delim"
            printf "%s\n" "$combined"
            echo "$delim"
            echo "needs_review=$needs_review"
          } >> "$GITHUB_OUTPUT"

      # =====================================================
      # AUTO-FIX: If review found issues, try to generate fix
      # =====================================================

      - name: Check if fix is straightforward
        id: check_straightforward
        if: ${{ steps.combine_reviews.outputs.needs_review == 'true' }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          REVIEW: ${{ steps.combine_reviews.outputs.combined_final_message }}
        run: |
          set -euo pipefail

          prompt_file="$(mktemp)"
          cat > "$prompt_file" <<PROMPT
          You are evaluating whether a set of code review issues can be fixed automatically with high confidence.

          The fix must be:
          - Mechanical / straightforward (not a design decision or architectural change)
          - Low risk of introducing new bugs
          - Fully deterministic from the review description alone (no ambiguity)

          Review issues:
          $REVIEW

          Answer with ONLY the word "yes" or "no". Nothing else.
          PROMPT

          raw_json="$(
            claude -p "$(cat "$prompt_file")" \
              --output-format json \
              --model claude-sonnet-4-5-20250929 \
              --max-turns 1
          )"

          answer="$(printf "%s" "$raw_json" | jq -r '.result // ""' | tr '[:upper:]' '[:lower:]' | xargs)"
          echo "Straightforward check answer: $answer"

          if echo "$answer" | grep -q "yes"; then
            echo "straightforward=true" >> "$GITHUB_OUTPUT"
          else
            echo "straightforward=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate fix with Claude Code
        id: generate_fix
        if: ${{ steps.check_straightforward.outputs.straightforward == 'true' }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          REVIEW: ${{ steps.combine_reviews.outputs.combined_final_message }}
        run: |
          set -euo pipefail

          prompt_file="$(mktemp)"
          cat > "$prompt_file" <<PROMPT
          You are an automated code fixer. Apply ONLY the fixes described in the review below.

          Rules:
          - Fix exactly the issues listed. Do not refactor or improve anything else.
          - Do not add comments explaining your changes.
          - Do not modify unrelated code.
          - If an issue is ambiguous or requires a design decision, skip it.

          Review issues to fix:
          $REVIEW

          Read the relevant files, apply the fixes, and write them back.
          PROMPT

          claude -p "$(cat "$prompt_file")" \
            --output-format json \
            --model claude-opus-4-6 \
            --allowedTools "Read,Write,Bash(git diff:*),Bash(git status:*)" \
            --max-turns 20

          # Check if any files were actually changed
          if git diff --quiet; then
            echo "No changes generated by auto-fix."
            echo "has_fix=false" >> "$GITHUB_OUTPUT"
          else
            echo "Auto-fix produced changes:"
            git diff --stat
            echo "has_fix=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push fix branch and create draft PR
        id: create_fix_pr
        if: ${{ steps.generate_fix.outputs.has_fix == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          short_sha="${{ github.sha }}"
          short_sha="${short_sha:0:8}"
          fix_branch="auto-fix/${short_sha}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$fix_branch"
          git add -A
          git commit -m "Auto-fix: address review issues for ${short_sha}

          Generated automatically from review of commit ${{ github.sha }}.
          Source branch: ${{ github.ref_name }}"

          git push origin "$fix_branch"

          # Create draft PR via GitHub API
          pr_response="$(curl -sS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "$(jq -nc \
              --arg title "Auto-fix: review issues on ${short_sha}" \
              --arg head "$fix_branch" \
              --arg base "${{ github.ref_name }}" \
              --arg body "## Auto-generated fix\n\nThis PR was automatically generated to address review issues found on commit [\`${short_sha}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).\n\n### Review issues addressed:\n${{ steps.combine_reviews.outputs.combined_final_message }}\n\n---\n⚠️ **Please review these changes carefully before merging.** This fix was generated automatically." \
              '{
                title: $title,
                head: $head,
                base: $base,
                body: $body,
                draft: true
              }'
            )"
          )"

          echo "PR API response:"
          printf '%s\n' "$pr_response"

          pr_url="$(printf '%s' "$pr_response" | jq -r '.html_url // ""')"
          pr_number="$(printf '%s' "$pr_response" | jq -r '.number // ""')"

          if [ -z "$pr_url" ] || [ "$pr_url" = "null" ]; then
            echo "::warning::Failed to create draft PR"
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
          else
            echo "Draft PR created: $pr_url"
            echo "has_pr=true" >> "$GITHUB_OUTPUT"
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          fi

      # =====================================================
      # END AUTO-FIX
      # =====================================================

      - name: Linkify file references for Cursor
        id: linkify_cursors
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REVIEW_TEXT: ${{ steps.combine_reviews.outputs.combined_final_message }}
          # Adjust to your local clone path:
          CURSOR_FILE_PREFIX: "cursor://file//Users/caseymanning/Documents/alliance/webapp"
        run: |
          set -euo pipefail

          # If there's no review text, just pass through
          if [ -z "${REVIEW_TEXT:-}" ]; then
            echo "No combined review text to linkify; passing through."
            delim="EOF_$(date +%s%N)"
            {
              echo "linkified_review<<$delim"
              printf "%s\n" "${REVIEW_TEXT:-}"
              echo "$delim"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          instructions="You will be given a short markdown review message that may mention files like \`apps/frontend/src/pages/app/HomePage.tsx:32\` or \`server/src/foo/bar.ts\`.

          Your job is:
          - Turn each file reference into a Slack mrkdwn link that opens Cursor on macOS.
          - Use the URL pattern: <\${CURSOR_FILE_PREFIX}/<repo-relative-path>:<line>|<file-label>>
          - Example:
            Input text: \`apps/frontend/src/pages/app/HomePage.tsx:32\`
            Output: <\${CURSOR_FILE_PREFIX}/apps/frontend/src/pages/app/HomePage.tsx:32|HomePage.tsx:32>
          - The file-label should usually be \"HomePage.tsx:32\" or similar.
          - If there is no line number, link the file without a :line suffix in the URL and label.
          - Do not output line ranges like \`1-3\`, only use single line numbers.
          - Do NOT change the wording of bullets except wrapping the file references in links.
          - Preserve the overall structure and any trailing token like [NEEDS_ATTENTION] exactly if present.
          - Include the text of the review as well as links to files in the output."

          payload="$(jq -nc \
            --arg instructions "$instructions" \
            --arg prefix "$CURSOR_FILE_PREFIX" \
            --arg text "$REVIEW_TEXT" \
            '{
              model: "gpt-4o-mini",
              messages: [
                { "role": "developer", "content": ($instructions | gsub("\\${CURSOR_FILE_PREFIX}"; $prefix)) },
                { "role": "user", "content": $text }
              ]
            }')"

          echo "Calling OpenAI to linkify file references..."
          response="$(
            curl -sS https://api.openai.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -d "$payload" || echo ""
          )"

          linkified="$REVIEW_TEXT"

          if [ -n "$response" ]; then
            if echo "$response" | jq -e '.error' >/dev/null 2>&1; then
              echo "OpenAI API error while linkifying review:" >&2
              echo "$response" | jq '.' >&2
              # fall back to original REVIEW_TEXT
            else
              tmp="$(printf "%s" "$response" | jq -r '.choices[0].message.content // ""')"
              if [ -n "$tmp" ]; then
                linkified="$tmp"
              else
                echo "Linkify result empty; falling back to original review text." >&2
              fi
            fi
          else
            echo "Empty response from OpenAI while linkifying; using original review text." >&2
          fi

          echo "Linkified review:"
          echo "-----------------"
          printf '%s\n' "$linkified"

          delim="EOF_$(date +%s%N)"
          {
            echo "linkified_review<<$delim"
            printf "%s\n" "$linkified"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      # --- Map GitHub actor -> Slack mention ---

      - name: Map GitHub actor to Slack mention
        id: actor_to_slack
        run: |
          actor="${{ github.actor }}"
          mention=""
          case "$actor" in
            CaseyManning)
              mention="<@U08P0THG741>"
              ;;
            sidsquid)
              mention="<@U08NU231VGS>"
              ;;
            markzxu)
              mention="<@U08P0TJ283T>"
              ;;
            charleslien)
              mention="<@U0A0WQQM8HZ>"
              ;;
          esac
          echo "mention=$mention" >> "$GITHUB_OUTPUT"

      # --- Build Slack payload from combined summary ---

      - name: Build Slack payload (needs review)
        id: slack_body_review
        if: ${{ steps.combine_reviews.outputs.needs_review == 'true' }}
        env:
          SUMMARY: ${{ steps.linkify_cursors.outputs.linkified_review }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_MENTION: ${{ steps.actor_to_slack.outputs.mention }}
          HAS_PR: ${{ steps.create_fix_pr.outputs.has_pr }}
          PR_URL: ${{ steps.create_fix_pr.outputs.pr_url }}
        run: |
          set -euo pipefail

          CLEAN_SUMMARY=$(printf "%s" "$SUMMARY" | sed -E 's/\[NEEDS[ _]ATTENTION\]//g' | sed -E 's/[[:space:]]+$//')

          # Build the buttons array: always include "Open run", optionally add "View Fix"
          buttons="$(jq -nc --arg url "$RUN_URL" '[
            {
              "type": "button",
              "text": { "type": "plain_text", "text": "Open run" },
              "url": $url
            }
          ]')"

          if [ "${HAS_PR:-}" = "true" ] && [ -n "${PR_URL:-}" ]; then
            buttons="$(printf '%s' "$buttons" | jq -c --arg pr_url "$PR_URL" '. + [
              {
                "type": "button",
                "text": { "type": "plain_text", "text": "View Fix ✨" },
                "url": $pr_url,
                "style": "primary"
              }
            ]')"
          fi

          jq -nc \
            --arg summary "$CLEAN_SUMMARY" \
            --arg mention "$SLACK_MENTION" \
            --argjson buttons "$buttons" \
            '{
              text: "review given",
              blocks: [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": (if $mention != "" then ($mention + " " + $summary) else $summary end)
                  }
                },
                (if ($buttons | length) > 0 then
                  {
                    "type": "actions",
                    "elements": $buttons
                  }
                else empty end)
              ]
            }' > slack.json

          # If we have a PR, also add a context block noting it
          if [ "${HAS_PR:-}" = "true" ] && [ -n "${PR_URL:-}" ]; then
            jq --arg pr_url "$PR_URL" \
              '.blocks += [{
                "type": "context",
                "elements": [{
                  "type": "mrkdwn",
                  "text": ("🤖 An auto-fix draft PR was generated: <" + $pr_url + "|View PR>")
                }]
              }]' slack.json > slack_tmp.json && mv slack_tmp.json slack.json
          fi

          {
            echo "payload<<EOF"
            cat slack.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack (NEEDS_REVIEW)
        if: ${{ steps.combine_reviews.outputs.needs_review == 'true' && (success() || failure()) }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CLA }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data @slack.json \
            "$SLACK_WEBHOOK_URL"
