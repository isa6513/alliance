# Frontend SSR + API reverse-proxy vhost.
#
# This is the source of truth. The deploy workflow (.github/workflows/deploy.yaml,
# job `deploy-react-app`) uploads this file to each server and writes it to
# /etc/nginx/conf.d/alliance.conf on every deploy — edit it here, not on the box.
#
# `__DOMAIN__` is substituted at deploy time with the per-environment domain
# (the `DOMAIN_NAME` GitHub environment variable): worldalliance.org in
# production, staging.worldalliance.org in staging. The same placeholder
# parameterizes both `server_name` and the certificate paths.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name __DOMAIN__;

    root /home/ec2-user/output/build/client;
    index index.html;

    # Media/file uploads post through /api/; the nginx default cap is 1M, which
    # would 413 them. Set generously at the server level so it also covers SSR.
    client_max_body_size 5000M;

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # X-Forwarded-For must reach the backend here: the signup rate limiter keys
    # on req.ip, and without it every request collapses to the nginx loopback
    # address and the per-IP throttle becomes a single global bucket.
    location /api/ {
        proxy_pass http://localhost:3005/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Reverse-proxy PostHog analytics ingestion. The frontend posts events to
    # https://<domain>/events/ (VITE_PUBLIC_POSTHOG_HOST) to dodge ad blockers;
    # nginx forwards to PostHog's US cloud.
    location /events/ {
        proxy_pass https://us.i.posthog.com/;
        proxy_set_header Host "us.i.posthog.com";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # Certs are issued/renewed by certbot out-of-band; this vhost only points at
    # them — it does not manage them. Do NOT run `certbot --nginx` against this
    # server (it rewrites the vhost, which this deploy overwrites every push).
    # New domain? Obtain the cert before the first deploy: nginx -t fails on a
    # missing cert path and will block the deploy until the cert exists.
    listen 443 ssl;
    http2 on;
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name __DOMAIN__;
    return 301 https://$host$request_uri;
}
