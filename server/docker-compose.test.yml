version: "3.9"

services:
  test-db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
    ports:
      # Map to a non-standard port so it doesn't clash with any local Postgres
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    # For faster startup in small projects
    tmpfs:
      - /var/lib/postgresql/data
